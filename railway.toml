# https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Use Dockerfile ENTRYPOINT only — clear any custom Start Command in Railway UI
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

# API service (default): uvicorn cpb_outreach.api.main:app
# Worker service: set start command in Railway dashboard to:
#   python -m cpb_outreach.worker.run_send
# Cron example (Railway cron): 0 14 * * 1-5  (weekdays 2pm UTC)
